name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            quizbank-author/package-lock.json

      - run: npm ci
        working-directory: quizbank-author

      - run: npm ci
        working-directory: app

      - run: npm test
        working-directory: app

      - run: npm run lint
        working-directory: app

      - run: npm run build
        working-directory: app
